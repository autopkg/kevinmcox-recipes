Description: Downloads the latest version of Adobe Log Collector Tool.
Identifier: com.github.kevinmcox.download.AdobeLogCollectorTool
MinimumVersion: "2.9.0"

Input:
  NAME: AdobeLogCollectorTool
  DOWNLOAD_URL: https://swupmf.adobe.com/webfeed/AdobeLogCollectorTool/macarm/LogCollectorTool.dmg

Process:
  - Processor: URLDownloader
    Arguments:
      url: "%DOWNLOAD_URL%"
      filename: "%NAME%.dmg"

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: "%pathname%/Log Collector tool.app"
      requirement: >-
        identifier "com.Adobe.Installers.AdobeLogCollectorTool" and
        anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6]
        /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13]
        /* exists */ and certificate leaf[subject.OU] = JQ525L2MZD

  - Processor: AppDmgVersioner
    Arguments:
      dmg_path: "%pathname%"
