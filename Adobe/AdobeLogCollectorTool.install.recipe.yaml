Description: Installs the latest version of Adobe Log Collector Tool.
Identifier: com.github.kevinmcox.install.AdobeLogCollectorTool
ParentRecipe: com.github.kevinmcox.download.AdobeLogCollectorTool
MinimumVersion: "2.9.0"

Input:
  NAME: AdobeLogCollectorTool

Process:
  - Processor: InstallFromDMG
    Arguments:
      dmg_path: "%pathname%"
      items_to_copy:
        - source_item: Log Collector tool.app
          destination_path: /Applications
