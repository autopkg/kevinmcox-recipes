Description: Downloads the latest version of Adobe Log Collector Tool and creates a package.
Identifier: com.github.kevinmcox.pkg.AdobeLogCollectorTool
ParentRecipe: com.github.kevinmcox.download.AdobeLogCollectorTool
MinimumVersion: "2.9.0"

Input:
  NAME: AdobeLogCollectorTool

Process:
  - Processor: AppPkgCreator
    Arguments:
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%-%version%.pkg"
