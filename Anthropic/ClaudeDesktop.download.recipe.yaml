Description: Downloads the latest version of Claude Desktop as a DMG.
Identifier: com.github.kevinmcox.download.ClaudeDesktop
MinimumVersion: "2.9.0"

Input:
  NAME: ClaudeDesktop

Process:
  - Processor: URLTextSearcher
    Arguments:
      re_pattern: https?://downloads\.claude\.ai/releases/darwin/universal/[0-9]+(?:\.[0-9]+)*/Claude-[a-f0-9]{40}(?=\.zip)
      url: https://downloads.claude.ai/releases/darwin/universal/RELEASES.json

  - Processor: URLDownloader
    Arguments:
      filename: "%NAME%.dmg"
      url: "%match%.dmg"

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: "%pathname%/Claude.app"
      requirement: >-
        identifier "com.anthropic.claudefordesktop" and anchor apple generic and
        certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and
        certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and
        certificate leaf[subject.OU] = Q6L2SF6YDW
