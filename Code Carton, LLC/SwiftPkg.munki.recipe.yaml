Description: >-
  Downloads the latest version of the swiftpkg CLI package (https://github.com/codecarton/swiftpkg) and imports it into Munki.
Identifier: com.github.kevinmcox.munki.SwiftPkg
ParentRecipe: com.github.kevinmcox.download.SwiftPkg
MinimumVersion: "2.9.0"

Input:
  NAME: SwiftPkg
  MUNKI_REPO_SUBDIR: SwiftPkg

  pkginfo:
    catalogs:
      - testing
    category: Utilities
    description: >-
      swiftpkg is a command-line tool for building Apple installer packages from version-control-friendly project directories, a Swift-native implementation of munki-pkg.
    developer: Code Carton, LLC
    display_name: SwiftPkg
    icon_name: SwiftPkgr.png
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true
    version_script: |
      #!/bin/sh
      /usr/local/bin/swiftpkg --version

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      flat_pkg_path: "%pathname%"
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpack/swiftpkg-%version%-cli.pkg/Payload"
      destination_path: "%RECIPE_CACHE_DIR%/payload/"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      derive_minimum_os_version: true
      installs_item_paths:
        - /usr/local/bin/swiftpkg

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
        - "%RECIPE_CACHE_DIR%/unpack"
