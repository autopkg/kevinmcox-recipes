Description: >-
  Downloads the latest version of the combined Swiftpkgr GUI app and swiftpkg CLI package (https://github.com/codecarton/swiftpkg) and imports it into Munki.
Identifier: com.github.kevinmcox.munki.SwiftPkgr
ParentRecipe: com.github.kevinmcox.download.SwiftPkgr
MinimumVersion: "2.9.0"

Input:
  NAME: SwiftPkgr
  MUNKI_REPO_SUBDIR: SwiftPkg

  pkginfo:
    catalogs:
      - testing
    category: Utilities
    description: >-
      swiftpkg is a command-line tool for building Apple installer packages from version-control-friendly project directories, a Swift-native implementation of munki-pkg. Swiftpkgr is its native macOS desktop app for editing and building the same package projects visually.
    developer: Code Carton, LLC
    display_name: SwiftPkgr
    icon_name: SwiftPkgr.png
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: FlatPkgUnpacker
    Arguments:
      flat_pkg_path: "%pathname%"
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      purge_destination: true

  - Processor: PkgPayloadUnpacker
    Arguments:
      pkg_payload_path: "%RECIPE_CACHE_DIR%/unpack/swiftpkg-%version%-combined.pkg/Payload"
      destination_path: "%RECIPE_CACHE_DIR%/payload/"
      purge_destination: true

  - Processor: MunkiInstallsItemsCreator
    Arguments:
      faux_root: "%RECIPE_CACHE_DIR%/payload"
      derive_minimum_os_version: true
      installs_item_paths:
        - /usr/local/bin/swiftpkg
        - /Applications/Swiftpkgr.app

  - Processor: MunkiPkginfoMerger

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%pathname%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/payload"
        - "%RECIPE_CACHE_DIR%/unpack"
