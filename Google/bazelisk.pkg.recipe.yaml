Description: Downloads and packages the latest version of Bazelisk (https://github.com/bazelbuild/bazelisk). Installs to /usr/local/bin/bazelisk.
Identifier: com.github.kevinmcox.pkg.bazelisk
ParentRecipe: com.github.kevinmcox.download.bazelisk
MinimumVersion: "2.9.0"

Input:
  NAME: bazelisk

Process:
  - Processor: PkgRootCreator
    Arguments:
      pkgroot: "%RECIPE_CACHE_DIR%/pkgroot"
      pkgdirs:
        usr/local/bin: "0775"

  - Processor: Copier
    Arguments:
      source_path: "%pathname%"
      destination_path: "%pkgroot%/usr/local/bin/bazelisk"

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        pkgroot: "%RECIPE_CACHE_DIR%/pkgroot"
        pkgname: "%NAME%-%version%"
        id: com.github.bazelbuild.bazelisk
        version: "%version%"
        chown:
          - path: usr/local/bin/bazelisk
            user: root
            group: wheel
            mode: "0755"
