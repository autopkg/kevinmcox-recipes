Description: Downloads the latest version of Manifold Security Endpoint Collector. Set ARCH to either arm64 or x86_64.
Identifier: com.github.kevinmcox.pkg.ManifoldSecurityEndpointCollector
ParentRecipe: com.github.kevinmcox.download.ManifoldSecurityEndpointCollector
MinimumVersion: "2.9.0"

Input:
  NAME: ManifoldSecurityEndpointCollector
  ARCH: arm64

Process:
  - Processor: "PkgRootCreator"
    Arguments:
      pkgroot: "%RECIPE_CACHE_DIR%/pkgroot"
      pkgdirs:
        usr/local/bin: "0755"

  - Processor: "FileMover"
    Arguments:
      source: "%RECIPE_CACHE_DIR%/unpack/manifold-endpoint-collector"
      target: "%RECIPE_CACHE_DIR%/pkgroot/usr/local/bin/manifold-endpoint-collector"

  - Processor: "PkgCreator"
    Arguments:
      pkg_request:
        pkgname: "ManifoldSecurityEndpointCollector-%ARCH%-%version%"
        pkgdir: "%RECIPE_CACHE_DIR%"
        id: "io.manifoldsecurity.endpoint-collector"
        version: "%version%"
        chown:
          - path: "usr"
            user: "root"
            group: "wheel"
