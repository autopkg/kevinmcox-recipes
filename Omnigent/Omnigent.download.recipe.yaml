Description: Downloads the latest version of Omnigent.
Identifier: com.github.kevinmcox.download.Omnigent
MinimumVersion: "2.9.0"

Input:
  NAME: Omnigent

Process:
  - Processor: URLDownloader
    Arguments:
      url: "https://omnigent.ai/download/mac"
      filename: Omnigent.dmg

  - Processor: EndOfCheckPhase

  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: "%pathname%/Omnigent.app"
      requirement: >-
        anchor apple generic and
        identifier "ai.omnigent.desktop" and
        (certificate leaf[field.1.2.840.113635.100.6.1.9] /* exists */ or
        certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and
        certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and
        certificate leaf[subject.OU] = "8RMX4WU6F8")
