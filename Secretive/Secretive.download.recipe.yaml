Description: Downloads the latest version of Secretive (https://github.com/maxgoedjen/secretive).
Identifier: com.github.kevinmcox.download.Secretive
MinimumVersion: "2.9.0"

Input:
  NAME: Secretive
  INCLUDE_PRERELEASES: ""

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      github_repo: maxgoedjen/secretive
      asset_regex: ^.*\.zip$
      include_prereleases: "%INCLUDE_PRERELEASES%"

  - Processor: URLDownloader
    Arguments:
      filename: "%NAME%.zip"

  - Processor: EndOfCheckPhase

  - Processor: Unarchiver
    Arguments:
      archive_path: "%pathname%"
      destination_path: "%RECIPE_CACHE_DIR%/unpack"
      purge_destination: true

  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: "%RECIPE_CACHE_DIR%/unpack/Secretive.app"
      requirement: >-
        anchor apple generic and identifier "com.maxgoedjen.Secretive.Host" and (certificate leaf[field.1.2.840.113635.100.6.1.9] /* exists */ or certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "Z72PRUAWF6")
      strict_verification: true
