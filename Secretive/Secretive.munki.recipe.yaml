Description: Downloads the latest version of Secretive (https://github.com/maxgoedjen/secretive) and imports it into Munki.
Identifier: com.github.kevinmcox.munki.Secretive
ParentRecipe: com.github.kevinmcox.download.Secretive
MinimumVersion: "2.9.0"

Input:
  NAME: Secretive
  MUNKI_REPO_SUBDIR: Secretive

  pkginfo:
    catalogs:
      - testing
    category: Utilities
    description: Store SSH keys in the Secure Enclave, encrypted and requiring biometric authentication to access.
    developer: Max Goedjen
    display_name: Secretive
    icon_name: "%NAME%.png"
    name: "%NAME%"
    unattended_install: true
    unattended_uninstall: true

Process:
  - Processor: DmgCreator
    Arguments:
      dmg_root: "%RECIPE_CACHE_DIR%/unpack"
      dmg_path: "%RECIPE_CACHE_DIR%/%NAME%-%version%.dmg"

  - Processor: MunkiImporter
    Arguments:
      pkg_path: "%dmg_path%"
      repo_subdirectory: "%MUNKI_REPO_SUBDIR%"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpack"
        - "%RECIPE_CACHE_DIR%/%NAME%-%version%.dmg"
