Description: Downloads the latest version of Secretive (https://github.com/maxgoedjen/secretive) and builds a package.
Identifier: com.github.kevinmcox.pkg.Secretive
ParentRecipe: com.github.kevinmcox.download.Secretive
MinimumVersion: "2.9.0"

Input:
  NAME: Secretive

Process:
  - Processor: AppPkgCreator
    Arguments:
      app_path: "%RECIPE_CACHE_DIR%/unpack/Secretive.app"
      pkg_path: "%RECIPE_CACHE_DIR%/%NAME%-%version%.pkg"

  - Processor: PathDeleter
    Arguments:
      path_list:
        - "%RECIPE_CACHE_DIR%/unpack"
